[system]
crate_name = "yadc-si"
unit_derives = ["Copy", "Clone"]
family_order = [
    "mechanical",
    "angular",
    "electromagnetic",
    "thermal",
    "fluid",
    "density",
    "chemistry",
    "photometric",
    "information",
]

[kind]
variants = ["Linear", "Affine", "Angle", "SolidAngle", "Invalid"]

[dim]
fields = ["m", "kg", "s", "A", "K", "mol", "cd"]

[dimensionless]  # Ratio units, always present in lib.rs.
units = [
    {v = "Ratio", m = "1.0", s = "", l = ""},
    {v = "PartPerHundred", m = "1.0e-2", s = "parts per hundred", l = "parts per hundred"},
    {v = "Percent", m = "1.0e-2", s = "%", l = "percent"},
    {v = "PartPerThousand", m = "1.0e-3", s = "parts per thousand", l = "parts per thousand"},
    {v = "PerMille", m = "1.0e-3", s = "‰", l = "per mille"},
    {v = "PartPerTenThousand", m = "1.0e-4", s = "parts per ten thousand", l = "parts per ten thousand"},
    {v = "BasisPoint", m = "1.0e-4", s = "bp", l = "basis points"},
    {v = "PartPerMillion", m = "1.0e-6", s = "ppm", l = "parts per million"},
    {v = "PartPerBillion", m = "1.0e-9", s = "ppb", l = "parts per billion"},
    {v = "PartPerTrillion", m = "1.0e-12", s = "ppt", l = "parts per trillion"},
    {v = "PartPerQuadrillion", m = "1.0e-15", s = "ppq", l = "parts per quadrillion"},
]

